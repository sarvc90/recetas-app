<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Administra tus recetas guardadas en El Rincón de los Sabores."
    />
    <meta
      property="og:title"
      content="El Rincón de los Sabores - Mis Recetas"
    />
    <meta
      property="og:description"
      content="Administra tus recetas guardadas y edítalas cuando quieras."
    />
    <meta property="og:image" content="icon.png" />
    <title>El Rincón de los Sabores - Mis Recetas</title>
    <link rel="stylesheet" href="styles-mis-recetas.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Saltar al contenido principal</a>
    <main id="main-content" class="container">
      <h1>Mis Recetas</h1>

      <div class="content-section">
        <div class="header-actions">
          <a href="recetas.html" class="back-btn"
            >⬅ Volver a todas las recetas</a
          >
        </div>

        <div
          id="message"
          class="hidden"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        ></div>
        <div
          id="loading"
          class="hidden"
          role="status"
          aria-live="polite"
          aria-atomic="true"
        >
          Cargando tus recetas...
        </div>

        <div class="header-actions">
          <button id="nuevaRecetaBtn" class="primary-btn" type="button">
            ➕ Nueva Receta
          </button>
        </div>

        <div id="misRecetasGrid" class="grid" aria-live="polite"></div>
      </div>
    </main>

    <div
      id="modal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalDescription"
    >
      <div class="modal-content">
        <button
          id="closeModal"
          class="close"
          type="button"
          aria-label="Cerrar detalle de receta"
        >
          &times;
        </button>
        <h2 id="modalTitle">Detalle de la receta</h2>
        <p id="modalDescription"></p>
        <img
          id="modalImage"
          alt="Imagen receta"
          width="500"
          height="300"
          loading="lazy"
        />
        <div class="modal-info">
          <h3>Ingredientes</h3>
          <ul id="modalIngredientes"></ul>
          <h3>Instrucciones</h3>
          <p id="modalInstrucciones"></p>
        </div>
      </div>
    </div>

    <div
      id="editModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="editModalTitle"
    >
      <div class="modal-content">
        <button
          id="closeEditModal"
          class="close"
          type="button"
          aria-label="Cerrar editor de receta"
        >
          &times;
        </button>
        <h2 id="editModalTitle">Editar Receta</h2>
        <form id="editForm">
          <div class="form-group">
            <label for="editRecipeName">Nombre de la receta:</label>
            <input type="text" id="editRecipeName" required />
          </div>
          <div class="form-group">
            <label for="editRecipeDescription">Descripción:</label>
            <textarea id="editRecipeDescription" required></textarea>
          </div>
          <div class="form-group">
            <label for="editRecipeImage">Cambiar imagen (opcional):</label>
            <input type="file" id="editRecipeImage" accept="image/*" />
            <div
              id="editImagePreview"
              class="image-preview"
              aria-live="polite"
            ></div>
          </div>
          <div class="form-group">
            <label for="editRecipeIngredients"
              >Ingredientes (uno por línea):</label
            >
            <textarea id="editRecipeIngredients" required></textarea>
          </div>
          <div class="form-group">
            <label for="editRecipeInstructions">Instrucciones:</label>
            <textarea id="editRecipeInstructions" required></textarea>
          </div>
          <div class="form-buttons">
            <button type="submit" class="submit-btn">Guardar Cambios</button>
          </div>
        </form>
      </div>
    </div>

    <div
      id="crearRecetaModal"
      class="modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="crearRecetaTitle"
    >
      <div class="modal-content">
        <button
          id="closeCrearRecetaModal"
          class="close"
          type="button"
          aria-label="Cerrar"
        >
          &times;
        </button>
        <h2 id="crearRecetaTitle">Nueva Receta</h2>
        <div id="crearRecetaResult" class="result hidden" role="alert"></div>
        <form id="crearRecetaForm" novalidate>
          <div class="form-group">
            <label for="crearRecipeName">Nombre:</label>
            <input type="text" id="crearRecipeName" required />
          </div>
          <div class="form-group">
            <label for="crearRecipeDescription">Descripción:</label>
            <textarea id="crearRecipeDescription" required></textarea>
          </div>
          <div class="form-group">
            <label for="crearRecipeImage">Imagen:</label>
            <input type="file" id="crearRecipeImage" accept="image/*" required />
            <div
              id="crearImagePreview"
              class="image-preview"
              aria-live="polite"
            ></div>
          </div>
          <div class="form-group">
            <label for="crearRecipeIngredients"
              >Ingredientes (uno por línea):</label
            >
            <textarea id="crearRecipeIngredients" required></textarea>
          </div>
          <div class="form-group">
            <label for="crearRecipeInstructions">Instrucciones:</label>
            <textarea id="crearRecipeInstructions" required></textarea>
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="crearEsExclusiva" />
              ¿Agregar a un plan exclusivo?
            </label>
          </div>
          <div class="form-group hidden" id="crearPlanSelectContainer">
            <label for="crearPlanSelect">Seleccionar plan:</label>
            <select id="crearPlanSelect"></select>
          </div>
          <div class="form-buttons">
            <button type="submit" class="submit-btn">Crear Receta</button>
            <button
              type="button"
              class="cancel-btn"
              id="cancelCrearRecetaBtn"
            >
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script
      src="config/env-loader.js"
      data-main="mis-recetas.js"
      defer
    ></script>
  </body>
</html>
