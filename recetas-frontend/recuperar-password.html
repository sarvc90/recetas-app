<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recetas App - Recuperar Contraseña</title>
    <link rel="stylesheet" href="styles-recuperar-password.css" />
  </head>
  <body>
    <div class="container">
      <h1>El Rincón de los Sabores</h1>

      <!-- PASO 1: SOLICITAR CÓDIGO -->
      <div id="paso-email" class="form-section">
        <h2>🔑 Recuperar Contraseña</h2>
        <p class="descripcion">
          Ingresa tu email y te enviaremos un código de recuperación.
        </p>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="tu@email.com" />
        </div>
        <button onclick="solicitarCodigo()">Enviar Código</button>
        <div id="resultado-email" class="result"></div>
      </div>

      <!-- PASO 2: INGRESAR CÓDIGO Y NUEVA CONTRASEÑA -->
      <div id="paso-reset" class="form-section" style="display: none">
        <h2>🔒 Nueva Contraseña</h2>
        <p class="descripcion">
          Ingresa el código que recibiste en tu email y tu nueva contraseña.
        </p>
        <div class="form-group">
          <label for="codigo">Código de recuperación:</label>
          <input
            type="text"
            id="codigo"
            placeholder="Ej: 123456"
            maxlength="6"
          />
        </div>
        <div class="form-group">
          <label for="nueva-password">Nueva contraseña:</label>
          <input
            type="password"
            id="nueva-password"
            placeholder="Mínimo 6 caracteres"
          />
        </div>
        <div class="form-group">
          <label for="confirmar-password">Confirmar contraseña:</label>
          <input
            type="password"
            id="confirmar-password"
            placeholder="Repite tu contraseña"
          />
        </div>
        <button onclick="resetPassword()">Cambiar Contraseña</button>
        <div id="resultado-reset" class="result"></div>
        <button class="btn-secondary" onclick="volverAPaso1()">
          ← Cambiar email
        </button>
      </div>

      <div class="links">
        <a href="index.html">← Volver al inicio de sesión</a>
      </div>
    </div>

    <script src="recuperar-password.js"></script>
  </body>
</html>
