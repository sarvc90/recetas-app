<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recetas App - Registro y Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>El Rincón de los Sabores</h1>

      <!-- SECCIÓN DE REGISTRO -->
      <div class="form-section">
        <h2>Registro de Usuario</h2>
        <div class="form-group">
          <label for="nombre">Nombre completo:</label>
          <input type="text" id="nombre" placeholder="Ej: María García" />
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="ejemplo@email.com" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            placeholder="Mínimo 6 caracteres"
          />
        </div>
        <button id="registro-btn" onclick="registrarUsuario()">
          Crear Cuenta
        </button>
        <div id="resultado-registro" class="result"></div>

        <!-- Código de verificación de email (visible tras enviar el registro) -->
        <div id="verification-code-section" style="display: none">
          <div class="form-group">
            <label for="verification-code">Código de verificación:</label>
            <input
              type="text"
              id="verification-code"
              maxlength="6"
              placeholder="Código de 6 dígitos"
              autocomplete="one-time-code"
            />
          </div>
          <button onclick="verificarRegistroCode()">
            Verificar y completar registro
          </button>
          <div style="text-align: center; margin-top: 10px">
            <a
              href="#"
              onclick="
                cancelarRegistro();
                return false;
              "
              style="
                color: #68c1e1;
                text-decoration: none;
                font-weight: bold;
                font-size: 14px;
              "
              >← Volver / Reenviar código</a
            >
          </div>
        </div>
      </div>

      <!-- SECCIÓN DE LOGIN -->
      <div class="form-section">
        <h2>Iniciar Sesión</h2>
        <div class="form-group">
          <label for="login-email">Email:</label>
          <input type="email" id="login-email" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña:</label>
          <input
            type="password"
            id="login-password"
            placeholder="Tu contraseña"
          />
        </div>
        <button id="login-btn" onclick="loginUsuario()">Ingresar</button>
        <div id="resultado-login" class="result"></div>

        <!-- Código de autenticación 2FA (visible tras primer envío) -->
        <div id="auth-code-section" style="display: none">
          <div class="form-group">
            <label for="auth-code">Código de autenticación:</label>
            <input
              type="text"
              id="auth-code"
              maxlength="6"
              placeholder="Código de 6 dígitos"
              autocomplete="one-time-code"
            />
          </div>
          <button onclick="verificarAuthCode()">Verificar código</button>
          <div style="text-align: center; margin-top: 10px">
            <a
              href="#"
              onclick="
                cancelarLogin();
                return false;
              "
              style="
                color: #68c1e1;
                text-decoration: none;
                font-weight: bold;
                font-size: 14px;
              "
              >← Volver / Reenviar código</a
            >
          </div>
        </div>

        <div style="text-align: center; margin-top: 15px">
          <a
            href="recuperar-password.html"
            style="
              color: #68c1e1;
              text-decoration: none;
              font-weight: bold;
              font-size: 14px;
            "
            >¿Olvidaste tu contraseña?</a
          >
        </div>
      </div>
    </div>

    <script src="config/env-loader.js" data-main="script.js"></script>
  </body>
</html>
