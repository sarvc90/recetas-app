<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="El Rincón de los Sabores: comparte y descubre recetas de la gastronomía colombiana."
    />
    <meta
      property="og:title"
      content="El Rincón de los Sabores - Iniciar Sesión"
    />
    <meta
      property="og:description"
      content="Comparte y descubre recetas de la gastronomía colombiana."
    />
    <meta property="og:image" content="icon.png" />
    <title>El Rincón de los Sabores - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Saltar al contenido principal</a>
    <main id="main-content" class="container">
      <header class="page-header">
        <h1>El Rincón de los Sabores</h1>
        <p class="page-subtitle">Accede con tu cuenta o crea una nueva.</p>
      </header>

      <!-- SECCIÓN DE REGISTRO -->
      <section class="form-section" aria-labelledby="registro-title">
        <h2 id="registro-title">Registro de Usuario</h2>
        <div class="form-group">
          <label for="nombre">Nombre completo:</label>
          <input type="text" id="nombre" placeholder="Ej: María García" />
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" placeholder="ejemplo@email.com" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña:</label>
          <input
            type="password"
            id="password"
            placeholder="Mínimo 6 caracteres"
          />
        </div>
        <button id="registro-btn" type="button" onclick="registrarUsuario()">
          Crear Cuenta
        </button>
        <div
          id="resultado-registro"
          class="result"
          role="status"
          aria-live="polite"
        ></div>

        <div id="verification-code-section" style="display: none">
          <div class="form-group">
            <label for="verification-code">Código de verificación:</label>
            <input
              type="text"
              id="verification-code"
              maxlength="6"
              placeholder="Código de 6 dígitos"
              autocomplete="one-time-code"
            />
          </div>
          <button type="button" onclick="verificarRegistroCode()">
            Verificar y completar registro
          </button>
          <div class="secondary-action">
            <a
              href="#"
              onclick="
                cancelarRegistro();
                return false;
              "
              >← Volver / Reenviar código</a
            >
          </div>
        </div>
      </section>

      <!-- SECCIÓN DE LOGIN -->
      <section class="form-section" aria-labelledby="login-title">
        <h2 id="login-title">Iniciar Sesión</h2>
        <div class="form-group">
          <label for="login-email">Email:</label>
          <input type="email" id="login-email" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña:</label>
          <input
            type="password"
            id="login-password"
            placeholder="Tu contraseña"
          />
        </div>
        <button id="login-btn" type="button" onclick="loginUsuario()">
          Ingresar
        </button>
        <div
          id="resultado-login"
          class="result"
          role="status"
          aria-live="polite"
        ></div>

        <div id="auth-code-section" style="display: none">
          <div class="form-group">
            <label for="auth-code">Código de autenticación:</label>
            <input
              type="text"
              id="auth-code"
              maxlength="6"
              placeholder="Código de 6 dígitos"
              autocomplete="one-time-code"
            />
          </div>
          <button type="button" onclick="verificarAuthCode()">
            Verificar código
          </button>
          <div class="secondary-action">
            <a
              href="#"
              onclick="
                cancelarLogin();
                return false;
              "
              >← Volver / Reenviar código</a
            >
          </div>
        </div>

        <div class="secondary-action secondary-action--spaced">
          <a href="recuperar-password.html">¿Olvidaste tu contraseña?</a>
        </div>
      </section>

      <footer class="page-footer">
        <p class="security-note">
          © El Rincón de los Sabores - 2026.
        </p>
      </footer>
    </main>

    <script src="config/env-loader.js" data-main="script.js" defer></script>
  </body>
</html>
