# =============================================================
# Prod profile (env-only)
# =============================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&serverTimezone=UTC&tcpKeepAlive=true&connectTimeout=30000
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

# Actuator + Prometheus (scraped over internal Docker network only)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true

logging.level.root=INFO
