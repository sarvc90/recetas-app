spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# CORS - Por defecto solo localhost:80 (frontend desplegado junto con backend)
# Se puede sobreescribir con variable de entorno CORS_ALLOWED_ORIGINS si es necesario
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:80,http://localhost}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}
