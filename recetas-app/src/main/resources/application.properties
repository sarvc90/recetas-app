# =============================================================
# Configuracion comun (se aplica en TODOS los perfiles)
# =============================================================
spring.application.name=RecetasApp
server.port=8080

# Perfil por defecto: dev (desarrollo local)
# En produccion se activa con: --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configuracion JPA/Hibernate (comun)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.open-in-view=false

# Configuracion de Cloudinary
