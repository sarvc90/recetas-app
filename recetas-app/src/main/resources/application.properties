# =============================================================
# Common configuration (all profiles)
# =============================================================
spring.application.name=RecetasApp
server.port=8080

# Active profile (override with SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Local-only env file (gitignored). Lets devs keep secrets out of source.
# Prod uses Docker env_file; this import becomes a no-op when the file is absent.
spring.config.import=optional:file:./recetas.env[.properties]

# JPA / Hibernate
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.generate-ddl=true
spring.jpa.open-in-view=false

# Multipart
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=8MB

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# SMTP
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=${SMTP_USERNAME}
smtp.password=${SMTP_PASSWORD}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY}

# Disable default UserDetailsService autoconfig
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
