# =============================================================
# Configuracion comun (se aplica en TODOS los perfiles)
# =============================================================
spring.application.name=RecetasApp
server.port=8080

# Perfil por defecto: dev (desarrollo local)
# En produccion se activa con: --spring.profiles.active=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configuracion JPA/Hibernate (comun)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.open-in-view=false

# Configuracion de Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Configuracion de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Configuracion SMTP
smtp.host=smtp.gmail.com
smtp.port=587
smtp.username=${SMTP_USERNAME}
smtp.password=${SMTP_PASSWORD}

# Configuracion CORS - Solo localhost:80 (frontend desplegado junto con backend)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:80,http://localhost}
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Stripe
stripe.secret.key=${STRIPE_SECRET_KEY}
