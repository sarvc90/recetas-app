server {
    listen 80;
    server_name rincon-sabores.online www.rincon-sabores.online;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port  $server_port;
    }

    # Grafana (basic auth + sub-path)
    location /grafana/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd/rincon-sabores.online;
        proxy_pass http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana live (websocket)
    location /grafana/api/live/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd/rincon-sabores.online;
        proxy_pass http://grafana:3000/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade   $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host      $host;
    }

    # Prometheus (basic auth + sub-path)
    location /prometheus/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/htpasswd/rincon-sabores.online;
        proxy_pass http://prometheus:9090/prometheus/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
