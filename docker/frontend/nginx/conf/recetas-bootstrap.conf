# docker/frontend/nginx/conf/recetas-bootstrap.conf
server {
    listen 80;
    server_name rincon-sabores.online www.rincon-sabores.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'bootstrap ok';
        add_header Content-Type text/plain;
    }
}