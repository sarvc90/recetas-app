services:
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/nginx/Dockerfile
    container_name: recetas-frontend
    ports:
      - "80:80"
    networks:
      - recetas-network
    volumes:
      - ./frontend/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/nginx/conf/recetas-bootstrap.conf:/etc/nginx/conf.d/recetas.conf:ro
      - ./frontend/certbot/www:/var/www/certbot
    restart: "no"

  certbot:
    image: certbot/certbot
    container_name: recetas-certbot
    volumes:
      - ./frontend/certbot/conf:/etc/letsencrypt
      - ./frontend/certbot/www:/var/www/certbot
    restart: "no"

networks:
  recetas-network:
    driver: bridge