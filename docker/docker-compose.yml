# Docker Compose configuration for the Recetas application

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: recetas-backend
    env_file:
      - ./recetas.env
    expose:
      - "8080"
    networks:
      - recetas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

      
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: recetas-nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - recetas-network
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - ./frontend/nginx/certs:/etc/nginx/certs:ro
      - /etc/nginx/vhost.d
      - /usr/share/nginx/html
    labels:
      - com.github.jrcs.letsencrypt_nginx_proxy_companion.nginx_proxy
    restart: unless-stopped

  letsencrypt:
    image: jrcs/letsencrypt-nginx-proxy-companion
    container_name: recetas-letsencrypt
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./frontend/nginx/certs:/etc/nginx/certs:rw
    volumes_from:
      - nginx-proxy:rw
    restart: unless-stopped

  frontend:
    image: nginx:latest
    container_name: recetas-frontend
    environment:
      - VIRTUAL_HOST=rincon-sabores.online,www.rincon-sabores.online
      - LETSENCRYPT_HOST=rincon-sabores.online,www.rincon-sabores.online
      - LETSENCRYPT_EMAIL=elrinconlossabores@gmail.com
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recetas-network
    volumes:
      - ./frontend/nginx/www:/usr/share/nginx/html:ro
      # - ./frontend/nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./frontend/nginx/conf/recetas.conf:/etc/nginx/conf.d/recetas.conf:ro
      - /home/admin/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=https://rincon-sabores.online/prometheus/"
      - "--web.route-prefix=/prometheus"
    expose:
      - "9090"
    networks:
      - recetas-network
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "-qO-", "http://localhost:9090/prometheus/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SERVER_ROOT_URL=https://rincon-sabores.online/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      - VIRTUAL_HOST=rincon-sabores.online,www.rincon-sabores.online
      - VIRTUAL_PORT=3000
    volumes:
      - grafana-data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - recetas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  recetas-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
